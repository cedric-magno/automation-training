name: Checkbox Progress Tracker

on:
  push:
    paths:
      - "Automation Training Plan.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run checkbox tracker
        run: node scripts/checkbox-tracker.js

      - name: Commit progress JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .github/progress-overall.json PROGRESS.md
          git commit -m "📊 Auto update progress from checkboxes" || exit 0
          git push